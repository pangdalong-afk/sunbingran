<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>外套数据+上款重点</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.header{background:#e8541e;color:#fff;padding:20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:1.15em;margin-bottom:6px}
.header .nav{display:flex;gap:8px;justify-content:center;align-items:center}
.header button{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 12px;cursor:pointer;font-size:.82em}
.header button:hover{background:rgba(255,255,255,.35)}
.header .page-info{font-size:.82em;min-width:55px}
.viewer{max-width:960px;margin:15px auto;padding:0 10px}
.pdf-page{background:#fff;margin-bottom:8px;border-radius:6px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);position:relative}
.pdf-page img{width:100%;display:block;min-height:300px;background:#fafafa}
.pdf-page .page-num{position:absolute;top:6px;right:10px;background:rgba(0,0,0,.4);color:#fff;padding:2px 8px;border-radius:10px;font-size:.7em;z-index:1}
.footer{text-align:center;padding:25px;color:#999;font-size:.8em}
@media(max-width:768px){.header{padding:12px 10px}.header h1{font-size:.95em}.viewer{padding:0 6px;max-width:100%}}
</style>
</head>
<body>
<div class="header"><h1>外套数据+上款重点</h1><div class="nav"><button onclick="S(1)">首页</button><button onclick="S(C-1)">上一页</button><span class="page-info" id="pi">1/12</span><button onclick="S(C+1)">下一页</button><button onclick="window.scrollTo({top:9e9,behavior:'smooth'})">末页</button></div></div>
<div class="viewer">
  <div class="pdf-page" id="page-1">
    <div class="page-num">1 / 12</div>
    <img src="coat_images/p1.jpg" alt="第1页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-2">
    <div class="page-num">2 / 12</div>
    <img src="coat_images/p2.jpg" alt="第2页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-3">
    <div class="page-num">3 / 12</div>
    <img src="coat_images/p3.jpg" alt="第3页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-4">
    <div class="page-num">4 / 12</div>
    <img src="coat_images/p4.jpg" alt="第4页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-5">
    <div class="page-num">5 / 12</div>
    <img src="coat_images/p5.jpg" alt="第5页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-6">
    <div class="page-num">6 / 12</div>
    <img src="coat_images/p6.jpg" alt="第6页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-7">
    <div class="page-num">7 / 12</div>
    <img src="coat_images/p7.jpg" alt="第7页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-8">
    <div class="page-num">8 / 12</div>
    <img src="coat_images/p8.jpg" alt="第8页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-9">
    <div class="page-num">9 / 12</div>
    <img src="coat_images/p9.jpg" alt="第9页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-10">
    <div class="page-num">10 / 12</div>
    <img src="coat_images/p10.jpg" alt="第10页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-11">
    <div class="page-num">11 / 12</div>
    <img src="coat_images/p11.jpg" alt="第11页" loading="lazy" width="960" height="540">
  </div>
  <div class="pdf-page" id="page-12">
    <div class="page-num">12 / 12</div>
    <img src="coat_images/p12.jpg" alt="第12页" loading="lazy" width="960" height="540">
  </div>
</div>
<div class="footer">共12页 · 高清版 · 保留PDF原始排版</div>
<script>var T=12,C=1;function S(n){if(n<1)n=1;if(n>T)n=T;C=n;var e=document.getElementById("page-"+n);if(e)e.scrollIntoView({behavior:"smooth",block:"start"});document.getElementById("pi").textContent=C+"/"+T}window.addEventListener("scroll",function(){var p=document.querySelectorAll(".pdf-page"),s=window.scrollY+80;for(var i=0;i<p.length;i++){if(p[i].offsetTop<=s&&p[i].offsetTop+p[i].offsetHeight>s){C=i+1;document.getElementById("pi").textContent=C+"/"+T;break}}});</script>
</body>
</html>
